name: E2E Tests — SauceDemo

on:
  push:
    branches: [main]
    paths:
      - 'dimension-1-technical/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dimension-1-technical/**'
      - '.github/workflows/e2e.yml'
  schedule:
    # Full suite daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      project:
        description: 'Playwright project to run (leave blank for all)'
        required: false
        default: ''

defaults:
  run:
    working-directory: dimension-1-technical

jobs:
  # ── PR gate: smoke only ─────────────────────────────────────────────────────
  smoke:
    name: Smoke (PR gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dimension-1-technical/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only for smoke)
        run: npx playwright install --with-deps chromium

      - name: Run auth setup
        run: npx playwright test --project=setup

      - name: Run smoke tests
        run: npx playwright test --project=smoke --reporter=github,html

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_id }}
          path: dimension-1-technical/playwright-report/
          retention-days: 7

  # ── Full suite: push to main + scheduled ───────────────────────────────────
  full:
    name: Full E2E (${{ matrix.project }})
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        project:
          - standard-user
          - auth-tests
          - locked-out-user
          - problem-user
          - performance-glitch-user
          - error-user
          - visual-user

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dimension-1-technical/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run auth setup
        # Setup is a dependency for most projects; running it unconditionally
        # is safe — it's fast and idempotent.
        run: npx playwright test --project=setup
        continue-on-error: false

      - name: Run ${{ matrix.project }} tests
        run: npx playwright test --project=${{ matrix.project }} --reporter=github,html
        env:
          CI: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.project }}-${{ github.run_id }}
          path: dimension-1-technical/playwright-report/
          retention-days: 14

      - name: Upload test results (traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ matrix.project }}-${{ github.run_id }}
          path: dimension-1-technical/test-results/
          retention-days: 14
